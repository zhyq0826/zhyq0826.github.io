		        <p>可能吧的阿禅的之前写了一篇文章介绍了他是如何排版公众号文章的：思路就是用 markdown 写作，然后使用专门的工具导出为 html 文件，最后把自定义的样式应用到导出的文件，复制粘贴最终的内容到微信公众号。</p>
<p>在这篇文章中，我将一步步说明如何把阿禅的思路应用到时间中。</p>
<h2 id="选择一款舒适的-markdown-写作工具"><a href="#选择一款舒适的-markdown-写作工具" class="headerlink" title="选择一款舒适的 markdown 写作工具"></a>选择一款舒适的 markdown 写作工具</h2><p>markdown 的写作工具有很多，这里我只介绍两款 mac 下的软件，非常好用，而且免费开源</p>
<ul>
<li><a href="http://www.typora.io/" target="_blank" rel="external">Typora</a> </li>
<li><a href="https://github.com/MacDownApp/macdown" target="_blank" rel="external">macdown</a> </li>
</ul>
<p>这两款 markdown 编辑器都支持所见即所得写作方式，支持多种主题、支持导出各种格式的文件。</p>
