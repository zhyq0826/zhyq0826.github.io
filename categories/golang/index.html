		  <h1 class="title"><a style="font-size: 18px" href="/2017/07/23/go-defer/">go defer 的关键特性解读和示例</a>
	  		<time datetime="2017-07-23T14:17:33.000Z">
			  	<!-- <a href="/2017/07/23/go-defer/"></a>  -->
			  	7月 23 2017
			</time>
		  </h1>
		  
			  <div class="tags">
			  	<i class="fa fa-tag"></i>
			    <a href="/tags/defer/">defer</a>
			  </div>
			
		</header>
		 <!-- 
		    <div class="entry">
		      
		        <h2 id="defer-的作用和执行时机"><a href="#defer-的作用和执行时机" class="headerlink" title="defer 的作用和执行时机"></a>defer 的作用和执行时机</h2><p>go 的 defer 语句是用来<strong>延迟执行函数的</strong>，而且延迟发生在<strong>调用函数 return 之后</strong>，比如</p>
<figure class="highlight go"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div></pre></td><td class="code"><pre><div class="line"><span class="function"><span class="keyword">func</span> <span class="title">a</span><span class="params">()</span> <span class="title">int</span></span> &#123;</div><div class="line">  <span class="keyword">defer</span> b()</div><div class="line">  <span class="keyword">return</span> <span class="number">0</span></div><div class="line">&#125;</div></pre></td></tr></table></figure>
<p>b 的执行是发生在 return 0 之后，注意 defer 的语法，关键字 defer 之后是函数的调用。</p>
<h2 id="defer-的重要用途之一：清理资源"><a href="#defer-的重要用途之一：清理资源" class="headerlink" title="defer 的重要用途之一：清理资源"></a>defer 的重要用途之一：清理资源</h2><p>由于 defer 的延迟特性，defer 常用在函数调用结束之后清理相关的资源，比如</p>
<figure class="highlight go"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div></pre></td><td class="code"><pre><div class="line">f, _ := os.Open(filename)</div><div class="line"><span class="keyword">defer</span> f.Close()</div></pre></td></tr></table></figure>
<p>文件资源的释放会在函数调用结束之后借助 defer 自动执行，不需要时刻记住哪里的资源需要释放，打开和释放必须相对应。</p>
<p>用一个例子深刻诠释一下 defer 带来的便利和简洁。</p>
<p>代码的主要目的是打开一个文件，然后复制内容到另一个新的文件中，没有 defer 时这样写：</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div><div class="line">12</div><div class="line">13</div><div class="line">14</div><div class="line">15</div><div class="line">16</div></pre></td><td class="code"><pre><div class="line">func CopyFile(dstName, srcName string) (written int64, err error) &#123;</div><div class="line">    src, err := os.Open(srcName)</div><div class="line">    if err != nil &#123;</div><div class="line">        return</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    dst, err := os.Create(dstName)</div><div class="line">    if err != nil &#123; //1</div><div class="line">        return</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    written, err = io.Copy(dst, src)</div><div class="line">    dst.Close()</div><div class="line">    src.Close()</div><div class="line">    return</div><div class="line">&#125;</div></pre></td></tr></table></figure>
<p>代码在 <code>#1</code> 处返回之后，src 文件没有执行关闭操作，可能会导致资源不能正确释放，改用 defer 实现：</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div><div class="line">12</div><div class="line">13</div><div class="line">14</div><div class="line">15</div></pre></td><td class="code"><pre><div class="line">func CopyFile(dstName, srcName string) (written int64, err error) &#123;</div><div class="line">    src, err := os.Open(srcName)</div><div class="line">    if err != nil &#123;</div><div class="line">        return</div><div class="line">    &#125;</div><div class="line">    defer src.Close()</div><div class="line"></div><div class="line">    dst, err := os.Create(dstName)</div><div class="line">    if err != nil &#123;</div><div class="line">        return</div><div class="line">    &#125;</div><div class="line">    defer dst.Close()</div><div class="line"></div><div class="line">    return io.Copy(dst, src)</div><div class="line">&#125;</div></pre></td></tr></table></figure>
<p>src 和 dst 都能及时清理和释放，无论 return 在什么地方执行。</p>
<p>鉴于 defer 的这种作用，defer 常用来释放数据库连接，文件打开句柄等释放资源的操作。</p>
<h2 id="多个-defer-的执行顺序"><a href="#多个-defer-的执行顺序" class="headerlink" title="多个 defer 的执行顺序"></a>多个 defer 的执行顺序</h2><p>defer 的作用就是把关键字之后的函数执行压入一个栈中延迟执行，多个 defer 的执行顺序是后进先出 LIFO ：</p>
<figure class="highlight go"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div></pre></td><td class="code"><pre><div class="line"><span class="keyword">defer</span> <span class="function"><span class="keyword">func</span><span class="params">()</span></span> &#123; fmt.Println(<span class="string">"1"</span>) &#125;()</div><div class="line"><span class="keyword">defer</span> <span class="function"><span class="keyword">func</span><span class="params">()</span></span> &#123; fmt.Println(<span class="string">"2"</span>) &#125;()</div><div class="line"><span class="keyword">defer</span> <span class="function"><span class="keyword">func</span><span class="params">()</span></span> &#123; fmt.Println(<span class="string">"3"</span>) &#125;()</div></pre></td></tr></table></figure>
<p>输出顺序是 321。</p>
<p>这个特性可以对一个 array 实现逆序操作。</p>
<h2 id="被-deferred-函数的参数在-defer-时确定"><a href="#被-deferred-函数的参数在-defer-时确定" class="headerlink" title="被 deferred 函数的参数在 defer 时确定"></a>被 deferred 函数的参数在 defer 时确定</h2><p>这是 defer 的特点，一个函数被 defer 时，它的参数在 defer 时进行计算确定，即使 defer 之后参数发生修改，对已经 defer 的函数没有影响，什么意思？看例子：</p>
<figure class="highlight go"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div></pre></td><td class="code"><pre><div class="line"><span class="function"><span class="keyword">func</span> <span class="title">a</span><span class="params">()</span></span> &#123;</div><div class="line">    i := <span class="number">0</span></div><div class="line">    <span class="keyword">defer</span> fmt.Println(i)</div><div class="line">    i++</div><div class="line">    <span class="keyword">return</span></div><div class="line">&#125;</div></pre></td></tr></table></figure>
<p>a 执行输出的是 0 而不是 1，因为 defer 时，i 的值是 0，此时被 defer 的函数参数已经进行执行计算并确定了。</p>
<p>再看一个例子：</p>
<figure class="highlight go"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div><div class="line">12</div><div class="line">13</div></pre></td><td class="code"><pre><div class="line"><span class="function"><span class="keyword">func</span> <span class="title">calc</span><span class="params">(index <span class="keyword">string</span>, a, b <span class="keyword">int</span>)</span> <span class="title">int</span></span> &#123;</div><div class="line">    ret := a + b</div><div class="line">    fmt.Println(index, a, b, ret)</div><div class="line">    <span class="keyword">return</span> ret</div><div class="line">&#125;</div><div class="line"></div><div class="line"><span class="function"><span class="keyword">func</span> <span class="title">main</span><span class="params">()</span></span> &#123;</div><div class="line">    a := <span class="number">1</span></div><div class="line">    b := <span class="number">2</span></div><div class="line">    <span class="keyword">defer</span> calc(<span class="string">"1"</span>, a, calc(<span class="string">"10"</span>, a, b))</div><div class="line">    a = <span class="number">0</span></div><div class="line">    <span class="keyword">return</span></div><div class="line">&#125;</div></pre></td></tr></table></figure>
<p>执行代码输出 </p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div></pre></td><td class="code"><pre><div class="line">10 1 2 3 </div><div class="line">1 1 3 4</div></pre></td></tr></table></figure>
<p>defer 函数的参数 第三个参数在 defer 时就已经计算完成并确定，第二个参数 a 也是如此，无论之后 a 变量是否修改都不影响。</p>
<h2 id="被-defer-的函数可以读取和修改带名称的返回值"><a href="#被-defer-的函数可以读取和修改带名称的返回值" class="headerlink" title="被 defer 的函数可以读取和修改带名称的返回值"></a>被 defer 的函数可以读取和修改带名称的返回值</h2><figure class="highlight go"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div></pre></td><td class="code"><pre><div class="line"><span class="function"><span class="keyword">func</span> <span class="title">c</span><span class="params">()</span> <span class="params">(i <span class="keyword">int</span>)</span></span> &#123;</div><div class="line">    <span class="keyword">defer</span> <span class="function"><span class="keyword">func</span><span class="params">()</span></span> &#123; i++ &#125;()</div><div class="line">    <span class="keyword">return</span> <span class="number">1</span></div><div class="line">&#125;</div></pre></td></tr></table></figure>
<p>被 defer 的函数是在 return 之后执行，可以修改带名称的返回值，上面的函数 c 返回的是 2。</p>

	  		<time datetime="2017-07-22T12:48:08.000Z">
			  	<!-- <a href="/2017/07/22/how-to-understand-go-interface/"></a>  -->
			  	7月 22 2017
			</time>
		  </h1>
		  
			  <div class="tags">
			  	<i class="fa fa-tag"></i>
			    <a href="/tags/interface/">interface</a>
			  </div>

		    <div class="entry">
		      
		        <h2 id="1、interface-是一种类型"><a href="#1、interface-是一种类型" class="headerlink" title="1、interface 是一种类型"></a>1、interface 是一种类型</h2><figure class="highlight go"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div></pre></td><td class="code"><pre><div class="line"></div><div class="line"><span class="keyword">type</span> I <span class="keyword">interface</span> &#123;</div><div class="line">    Get() <span class="keyword">int</span></div><div class="line">&#125;</div></pre></td></tr></table></figure>
<p>首先 <strong>interface 是一种类型</strong>，从它的定义可以看出来用了 type 关键字，更准确的说 interface 是一种<strong>具有一组方法的类型</strong>，这些方法定义了 interface 的行为。</p>
<p>go 允许不带任何方法的 interface ，这种类型的 interface 叫 <strong>empty interface</strong>。</p>
<p><strong>如果一个类型实现了一个 interface 中所有方法，我们说类型实现了该 interface</strong>，所以所有类型都实现了 empty interface，因为任何一种类型至少实现了 0 个方法。go 没有显式的关键字用来实现 interface，只需要实现 interface 包含的方法即可。</p>
<h2 id="2、interface-变量存储的是实现者的值"><a href="#2、interface-变量存储的是实现者的值" class="headerlink" title="2、interface 变量存储的是实现者的值"></a>2、interface 变量存储的是实现者的值</h2><figure class="highlight go"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div><div class="line">12</div><div class="line">13</div><div class="line">14</div><div class="line">15</div><div class="line">16</div><div class="line">17</div><div class="line">18</div><div class="line">19</div><div class="line">20</div><div class="line">21</div><div class="line">22</div><div class="line">23</div><div class="line">24</div><div class="line">25</div><div class="line">26</div><div class="line">27</div><div class="line">28</div><div class="line">29</div></pre></td><td class="code"><pre><div class="line"><span class="comment">//1</span></div><div class="line"><span class="keyword">type</span> I <span class="keyword">interface</span> &#123;    </div><div class="line">    Get() <span class="keyword">int</span></div><div class="line">    Set(<span class="keyword">int</span>)</div><div class="line">&#125;</div><div class="line"></div><div class="line"><span class="comment">//2</span></div><div class="line"><span class="keyword">type</span> S <span class="keyword">struct</span> &#123;</div><div class="line">    Age <span class="keyword">int</span></div><div class="line">&#125;</div><div class="line"></div><div class="line"><span class="function"><span class="keyword">func</span><span class="params">(s S)</span> <span class="title">Get</span><span class="params">()</span><span class="title">int</span></span> &#123;</div><div class="line">    <span class="keyword">return</span> s.Age</div><div class="line">&#125;</div><div class="line"></div><div class="line"><span class="function"><span class="keyword">func</span><span class="params">(s *S)</span> <span class="title">Set</span><span class="params">(age <span class="keyword">int</span>)</span></span> &#123;</div><div class="line">    s.Age = age</div><div class="line">&#125;</div><div class="line"></div><div class="line"><span class="comment">//3</span></div><div class="line"><span class="function"><span class="keyword">func</span> <span class="title">f</span><span class="params">(i I)</span></span>&#123;</div><div class="line">    i.Set(<span class="number">10</span>)</div><div class="line">    fmt.Println(i.Get())</div><div class="line">&#125;</div><div class="line"></div><div class="line"><span class="function"><span class="keyword">func</span> <span class="title">main</span><span class="params">()</span></span> &#123;</div><div class="line">    s := S&#123;&#125; </div><div class="line">    f(&amp;s)  <span class="comment">//4</span></div><div class="line">&#125;</div></pre></td></tr></table></figure>
<p>这段代码在 <code>#1</code> 定义了 interface I，在 <code>#2</code> 用 struct S 实现了 I 定义的两个方法，接着在 <code>#3</code> 定义了一个函数 f 参数类型是 I，S 实现了 I 的两个方法就说 S 是 I 的实现者，执行 <code>f(&amp;s)</code> 就完了一次 interface 类型的使用。</p>
<p>interface 的重要用途就体现在<strong>函数 f 的参数中</strong>，如果有多种类型实现了某个 interface，<strong>这些类型的值都可以直接使用 interface 的变量存储</strong>。<br><figure class="highlight go"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div></pre></td><td class="code"><pre><div class="line">s := S&#123;&#125;</div><div class="line"><span class="keyword">var</span> i I <span class="comment">//声明 i </span></div><div class="line">i = &amp;s <span class="comment">//赋值 s 到 i</span></div><div class="line">fmt.Println(i.Get())</div></pre></td></tr></table></figure></p>
<p>不难看出 interface 的变量中存储的是实现了 interface 的类型的对象值，这种能力是 <a href="http://en.wikipedia.org/wiki/Duck_typing" target="_blank" rel="external">duck typing</a>。在使用 interface 时不需要显式在 struct 上声明要实现哪个 interface ，只需要实现对应 interface 中的方法即可，go 会自动进行 interface 的检查，并在运行时执行从其他类型到 interface 的自动转换，即使实现了多个 interface，go 也会在使用对应 interface 时实现自动转换，这就是 interface 的魔力所在。</p>
<h2 id="3、如何判断-interface-变量存储的是哪种类型"><a href="#3、如何判断-interface-变量存储的是哪种类型" class="headerlink" title="3、如何判断 interface 变量存储的是哪种类型"></a>3、如何判断 interface 变量存储的是哪种类型</h2><p>一个 interface 被多种类型实现时，有时候我们需要区分 interface 的变量究竟存储哪种类型的值，go 可以使用 <code>comma, ok</code> 的形式做区分 <code>value, ok := em.(T)</code>：<strong>em 是 interface 类型的变量，T代表要断言的类型，value 是 interface 变量存储的值，ok 是 bool 类型表示是否为该断言的类型 T</strong>。</p>
<figure class="highlight go"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div></pre></td><td class="code"><pre><div class="line"></div><div class="line"><span class="keyword">if</span> t, ok := i.(*S); ok &#123;</div><div class="line">    fmt.Println(<span class="string">"s implements I"</span>, t)</div><div class="line">&#125;</div></pre></td></tr></table></figure>
<p>ok 是 true 表明 i 存储的是 *S 类型的值，false 则不是，这种区分能力叫 <a href="https://tour.golang.org/methods/15" target="_blank" rel="external">Type assertions</a> (类型断言)。</p>
<p>如果需要区分多种类型，可以使用 switch 断言，更简单直接，这种断言方式只能在 switch 语句中使用。</p>
<figure class="highlight go"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div></pre></td><td class="code"><pre><div class="line"></div><div class="line"><span class="keyword">switch</span> t := i.(<span class="keyword">type</span>) &#123;</div><div class="line"><span class="keyword">case</span> *S:</div><div class="line">    fmt.Println(<span class="string">"i store *S"</span>, t)</div><div class="line"><span class="keyword">case</span> *R:</div><div class="line">    fmt.Println(<span class="string">"i store *R"</span>, t)</div><div class="line">&#125;</div></pre></td></tr></table></figure>
<h2 id="4、空的-interface"><a href="#4、空的-interface" class="headerlink" title="4、空的 interface"></a>4、空的 interface</h2><p><code>interface{}</code> 是一个空的 interface 类型，根据前文的定义：一个类型如果实现了一个 interface 的所有方法就说该类型实现了这个 interface，空的 interface 没有方法，所以可以认为所有的类型都实现了 <code>interface{}</code>。如果定义一个函数参数是 <code>interface{}</code> 类型，这个函数应该可以接受任何类型作为它的参数。</p>
<figure class="highlight go"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div></pre></td><td class="code"><pre><div class="line"><span class="function"><span class="keyword">func</span> <span class="title">doSomething</span><span class="params">(v <span class="keyword">interface</span>&#123;&#125;)</span></span>&#123;    </div><div class="line">&#125;</div></pre></td></tr></table></figure>
<p>如果函数的参数  v 可以接受任何类型，那么函数被调用时在函数内部 v 是不是表示的是任何类型？并不是，虽然函数的参数可以接受任何类型，并不表示 v 就是任何类型，在函数 doSomething 内部 v 仅仅是一个 interface 类型，之所以函数可以接受任何类型是在 go 执行时传递到函数的任何类型都被自动转换成 <code>interface{}</code>。go 是如何进行转换的，以及 v 存储的值究竟是怎么做到可以接受任何类型的，感兴趣的可以看看 <a href="https://research.swtch.com/interfaces" target="_blank" rel="external">Russ Cox 关于 interface 的实现</a> 。</p>
<p>既然空的 interface 可以接受任何类型的参数，那么一个 <code>interface{}</code>类型的 slice 是不是就可以接受任何类型的 slice ?</p>
<figure class="highlight go"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div></pre></td><td class="code"><pre><div class="line"><span class="function"><span class="keyword">func</span> <span class="title">printAll</span><span class="params">(vals []<span class="keyword">interface</span>&#123;&#125;)</span></span> &#123; <span class="comment">//1</span></div><div class="line">	<span class="keyword">for</span> _, val := <span class="keyword">range</span> vals &#123;</div><div class="line">		fmt.Println(val)</div><div class="line">	&#125;</div><div class="line">&#125;</div><div class="line"></div><div class="line"><span class="function"><span class="keyword">func</span> <span class="title">main</span><span class="params">()</span></span>&#123;</div><div class="line">	names := []<span class="keyword">string</span>&#123;<span class="string">"stanley"</span>, <span class="string">"david"</span>, <span class="string">"oscar"</span>&#125;</div><div class="line">	printAll(names)</div><div class="line">&#125;</div></pre></td></tr></table></figure>
<p>上面的代码是按照我们的假设修改的，执行之后竟然会报  <code>cannot use names (type []string) as type []interface {} in argument to printAll</code>  错误，why？</p>
<p>这个错误说明 go 没有帮助我们自动把 slice 转换成 <code>interface{}</code> 类型的 slice，所以出错了。<strong>go 不会对 类型是<code>interface{}</code> 的 slice 进行转换</strong> 。为什么 go 不帮我们自动转换，一开始我也很好奇，最后终于在 go 的 wiki 中找到了答案 <a href="https://github.com/golang/go/wiki/InterfaceSlice" target="_blank" rel="external">https://github.com/golang/go/wiki/InterfaceSlice</a> 大意是 <code>interface{}</code> 会占用两个字长的存储空间，一个是自身的 methods 数据，一个是指向其存储值的指针，也就是 interface 变量存储的值，因而 slice []interface{} 其长度是固定的<code>N*2</code>，但是 []T 的长度是<code>N*sizeof(T)</code>，两种 slice 实际存储值的大小是有区别的(文中只介绍两种 slice 的不同，至于为什么不能转换猜测可能是 runtime 转换代价比较大)。</p>
<p>但是我们可以手动进行转换来达到我们的目的。</p>
<figure class="highlight go"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div></pre></td><td class="code"><pre><div class="line"><span class="keyword">var</span> dataSlice []<span class="keyword">int</span> = foo()</div><div class="line"><span class="keyword">var</span> interfaceSlice []<span class="keyword">interface</span>&#123;&#125; = <span class="built_in">make</span>([]<span class="keyword">interface</span>&#123;&#125;, <span class="built_in">len</span>(dataSlice))</div><div class="line"><span class="keyword">for</span> i, d := <span class="keyword">range</span> dataSlice &#123;</div><div class="line">	interfaceSlice[i] = d</div><div class="line">&#125;</div></pre></td></tr></table></figure>
<h2 id="5、interface-的实现者的-receiver-如何选择"><a href="#5、interface-的实现者的-receiver-如何选择" class="headerlink" title="5、interface 的实现者的 receiver 如何选择"></a>5、interface 的实现者的 receiver 如何选择</h2><p>在我们上文的例子中调用 f 是 <code>f(&amp;s)</code> 也就是 S 的指针类型，为什么不能是 <code>f(s)</code> 呢，如果是 s 会有什么问题？改成 f(s) 然后执行代码。</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div></pre></td><td class="code"><pre><div class="line">cannot use s (type S) as type I in argument to f:</div><div class="line">	S does not implement I (Set method has pointer receiver)</div></pre></td></tr></table></figure>
<p>这个错误的意思是 S 没有实现 I，哪里出了问题？<strong>关键点是 S 中 set 方法的 receiver 是个 pointer *S</strong> 。</p>
<p>interface 定义时并没有严格规定实现者的方法 receiver 是个 value receiver 还是 pointer receiver，上面代码中的 S 的 Set receiver 是 pointer，也就是实现 I 的两个方法的 receiver 一个是 value 一个是 pointer，使用 <code>f(s)</code>的形势调用，传递给 f 的是个 s 的一份拷贝，在进行 s 的拷贝到 I 的转换时，s 的拷贝不满足 Set 方法的 receiver 是个 pointer，也就没有实现 I。<strong>go 中函数都是按值传递即 passed by value</strong>。</p>
<p>那反过来会怎样，如果 receiver 是 value，函数用 pointer 的形式调用？</p>
<figure class="highlight go"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div><div class="line">12</div><div class="line">13</div><div class="line">14</div><div class="line">15</div><div class="line">16</div><div class="line">17</div><div class="line">18</div><div class="line">19</div><div class="line">20</div><div class="line">21</div><div class="line">22</div><div class="line">23</div><div class="line">24</div><div class="line">25</div><div class="line">26</div><div class="line">27</div></pre></td><td class="code"><pre><div class="line"><span class="keyword">type</span> I <span class="keyword">interface</span> &#123;</div><div class="line">	Get() <span class="keyword">int</span></div><div class="line">	Set(<span class="keyword">int</span>)</div><div class="line">&#125;</div><div class="line"></div><div class="line"><span class="keyword">type</span> SS <span class="keyword">struct</span> &#123;</div><div class="line">	Age <span class="keyword">int</span></div><div class="line">&#125;</div><div class="line"></div><div class="line"><span class="function"><span class="keyword">func</span> <span class="params">(s SS)</span> <span class="title">Get</span><span class="params">()</span> <span class="title">int</span></span> &#123;</div><div class="line">	<span class="keyword">return</span> s.Age</div><div class="line">&#125;</div><div class="line"></div><div class="line"><span class="function"><span class="keyword">func</span> <span class="params">(s SS)</span> <span class="title">Set</span><span class="params">(age <span class="keyword">int</span>)</span></span> &#123;</div><div class="line">	s.Age = age</div><div class="line">&#125;</div><div class="line"></div><div class="line"><span class="function"><span class="keyword">func</span> <span class="title">f</span><span class="params">(i I)</span></span> &#123;</div><div class="line">	i.Set(<span class="number">10</span>)</div><div class="line">	fmt.Println(i.Get())</div><div class="line">&#125;</div><div class="line"></div><div class="line"><span class="function"><span class="keyword">func</span> <span class="title">main</span><span class="params">()</span></span>&#123;</div><div class="line">  	ss := SS&#123;&#125;</div><div class="line">	f(&amp;ss) <span class="comment">//ponter</span></div><div class="line">	f(ss)  <span class="comment">//value</span></div><div class="line">&#125;</div></pre></td></tr></table></figure>
<p>I 的实现者 SS 的方法 receiver 都是 value receiver，执行代码可以看到无论是 pointer 还是 value 都可以正确执行。</p>
<p>导致这一现象的原因是什么？</p>
<p>如果是按 pointer 调用，go 会自动进行转换，因为有了指针总是能得到指针指向的值是什么，如果是 value 调用，go 将无从得知 value 的原始值是什么，因为 value 是份拷贝。<strong>go 会把指针进行隐式转换得到 value，但反过来则不行</strong>。</p>
<p>对于 receiver 是 value 的 method，任何在 method 内部对 value 做出的改变都不影响调用者看到的 value，这就是按值传递。</p>
<p>另一个说明上述现象的例子是这样的来自 <a href="https://play.golang.org/p/TvR758rfre" target="_blank" rel="external">https://play.golang.org/p/TvR758rfre</a></p>
<figure class="highlight go"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div><div class="line">12</div><div class="line">13</div><div class="line">14</div><div class="line">15</div><div class="line">16</div><div class="line">17</div><div class="line">18</div><div class="line">19</div><div class="line">20</div><div class="line">21</div><div class="line">22</div><div class="line">23</div><div class="line">24</div><div class="line">25</div><div class="line">26</div><div class="line">27</div><div class="line">28</div><div class="line">29</div><div class="line">30</div><div class="line">31</div><div class="line">32</div><div class="line">33</div><div class="line">34</div><div class="line">35</div><div class="line">36</div><div class="line">37</div><div class="line">38</div><div class="line">39</div><div class="line">40</div><div class="line">41</div><div class="line">42</div><div class="line">43</div><div class="line">44</div><div class="line">45</div></pre></td><td class="code"><pre><div class="line"><span class="keyword">package</span> main</div><div class="line"></div><div class="line"><span class="keyword">import</span> (</div><div class="line">	<span class="string">"fmt"</span></div><div class="line">)</div><div class="line"></div><div class="line"><span class="keyword">type</span> Animal <span class="keyword">interface</span> &#123;</div><div class="line">	Speak() <span class="keyword">string</span></div><div class="line">&#125;</div><div class="line"></div><div class="line"><span class="keyword">type</span> Dog <span class="keyword">struct</span> &#123;</div><div class="line">&#125;</div><div class="line"></div><div class="line"><span class="function"><span class="keyword">func</span> <span class="params">(d Dog)</span> <span class="title">Speak</span><span class="params">()</span> <span class="title">string</span></span> &#123;</div><div class="line">	<span class="keyword">return</span> <span class="string">"Woof!"</span></div><div class="line">&#125;</div><div class="line"></div><div class="line"><span class="keyword">type</span> Cat <span class="keyword">struct</span> &#123;</div><div class="line">&#125;</div><div class="line"></div><div class="line"><span class="comment">//1</span></div><div class="line"><span class="function"><span class="keyword">func</span> <span class="params">(c *Cat)</span> <span class="title">Speak</span><span class="params">()</span> <span class="title">string</span></span> &#123;</div><div class="line">	<span class="keyword">return</span> <span class="string">"Meow!"</span></div><div class="line">&#125;</div><div class="line"></div><div class="line"><span class="keyword">type</span> Llama <span class="keyword">struct</span> &#123;</div><div class="line">&#125;</div><div class="line"></div><div class="line"><span class="function"><span class="keyword">func</span> <span class="params">(l Llama)</span> <span class="title">Speak</span><span class="params">()</span> <span class="title">string</span></span> &#123;</div><div class="line">	<span class="keyword">return</span> <span class="string">"?????"</span></div><div class="line">&#125;</div><div class="line"></div><div class="line"><span class="keyword">type</span> JavaProgrammer <span class="keyword">struct</span> &#123;</div><div class="line">&#125;</div><div class="line"></div><div class="line"><span class="function"><span class="keyword">func</span> <span class="params">(j JavaProgrammer)</span> <span class="title">Speak</span><span class="params">()</span> <span class="title">string</span></span> &#123;</div><div class="line">	<span class="keyword">return</span> <span class="string">"Design patterns!"</span></div><div class="line">&#125;</div><div class="line"></div><div class="line"><span class="function"><span class="keyword">func</span> <span class="title">main</span><span class="params">()</span></span> &#123;</div><div class="line">	animals := []Animal&#123;Dog&#123;&#125;, Cat&#123;&#125;, Llama&#123;&#125;, JavaProgrammer&#123;&#125;&#125;</div><div class="line">	<span class="keyword">for</span> _, animal := <span class="keyword">range</span> animals &#123;</div><div class="line">		fmt.Println(animal.Speak())</div><div class="line">	&#125;</div><div class="line">&#125;</div></pre></td></tr></table></figure>
<p><code>#1</code> Cat 的 speak receiver 是 pointer，interface Animal 的 slice，Cat 的值是一个 value，同样会因为 receiver 不一致而导致无法执行。</p>

	<article  class="post">
		<header>
		  <h1 class="title"><a style="font-size: 18px" href="/2017/06/11/go-nil/">如何理解 golang nil</a>
	  		<time datetime="2017-06-11T12:01:41.000Z">
			  	<!-- <a href="/2017/06/11/go-nil/"></a>  -->
			  	6月 11 2017
			</time>
		  </h1>
		  
		</header>
		 <!-- 
		    <div class="entry">
		      
		        <p>golang 中的 nil 是不同于其他语言的，为了更好的理解 nil，在此我将尝试一步一步揭示 nil 在 golang 中的一些操作和现象。</p>
<h2 id="1-nil-是不能比较的"><a href="#1-nil-是不能比较的" class="headerlink" title="1. nil 是不能比较的"></a>1. nil 是不能比较的</h2><p><strong>code-1</strong> <a href="https://play.golang.org/p/FM7oW794sU" target="_blank" rel="external">Play</a> </p>
<figure class="highlight go"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div></pre></td><td class="code"><pre><div class="line"><span class="keyword">package</span> main</div><div class="line"></div><div class="line"><span class="keyword">import</span> (</div><div class="line">    <span class="string">"fmt"</span></div><div class="line">)</div><div class="line"></div><div class="line"><span class="function"><span class="keyword">func</span> <span class="title">main</span><span class="params">()</span></span> &#123;</div><div class="line">    fmt.Println(<span class="literal">nil</span>==<span class="literal">nil</span>)</div><div class="line">&#125;</div></pre></td></tr></table></figure>
<p>code-1 输出</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div></pre></td><td class="code"><pre><div class="line">tmp/sandbox318449491/main.go:8: invalid operation: nil == nil (operator == not defined on nil)</div></pre></td></tr></table></figure>
<p>这点和 python 等动态语言是不同的，在 python 中，两个 None 值永远相等。</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div></pre></td><td class="code"><pre><div class="line"><span class="meta">&gt;&gt;&gt; </span><span class="keyword">None</span> == <span class="keyword">None</span></div><div class="line"><span class="keyword">True</span></div><div class="line">&gt;&gt;&gt;</div></pre></td></tr></table></figure>
<p>从 go 的输出结果不难看出，<code>==</code> 对于 nil 来说是一种未定义的操作。</p>
<h2 id="2-默认-nil-是-typed-的"><a href="#2-默认-nil-是-typed-的" class="headerlink" title="2. 默认 nil 是 typed 的"></a>2. 默认 nil 是 typed 的</h2><p><strong>code-2</strong> <a href="https://play.golang.org/p/PVGa9tCWSs" target="_blank" rel="external">Play</a></p>
<figure class="highlight go"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div></pre></td><td class="code"><pre><div class="line"><span class="keyword">package</span> main</div><div class="line"></div><div class="line"><span class="keyword">import</span> (</div><div class="line">	<span class="string">"fmt"</span></div><div class="line">)</div><div class="line"></div><div class="line"><span class="function"><span class="keyword">func</span> <span class="title">main</span><span class="params">()</span></span> &#123;</div><div class="line">	fmt.Printf(<span class="string">"%T"</span>, <span class="literal">nil</span>) </div><div class="line">	<span class="built_in">print</span>(<span class="literal">nil</span>)</div><div class="line">&#125;</div></pre></td></tr></table></figure>
<p>code-2 输出</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div></pre></td><td class="code"><pre><div class="line">tmp/sandbox379579345/main.go:9: use of untyped nil</div></pre></td></tr></table></figure>
<p>print 的输出时未指定类型的，因而无法输出</p>
<h2 id="3-不同类型-nil-的-address-是一样的"><a href="#3-不同类型-nil-的-address-是一样的" class="headerlink" title="3. 不同类型 nil 的 address 是一样的"></a>3. 不同类型 nil 的 address 是一样的</h2><p><strong>code-3</strong> <a href="https://play.golang.org/p/YQkFQx1hPi" target="_blank" rel="external">Play</a></p>
<figure class="highlight go"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div><div class="line">12</div></pre></td><td class="code"><pre><div class="line"><span class="keyword">package</span> main</div><div class="line"></div><div class="line"><span class="keyword">import</span> (</div><div class="line">	<span class="string">"fmt"</span></div><div class="line">)</div><div class="line"></div><div class="line"><span class="function"><span class="keyword">func</span> <span class="title">main</span><span class="params">()</span></span> &#123;</div><div class="line">	<span class="keyword">var</span> m <span class="keyword">map</span>[<span class="keyword">int</span>]<span class="keyword">string</span></div><div class="line">	<span class="keyword">var</span> ptr *<span class="keyword">int</span></div><div class="line">	fmt.Printf(<span class="string">"%p"</span>, m)</div><div class="line">	fmt.Printf(<span class="string">"%p"</span>, ptr)</div><div class="line">&#125;</div></pre></td></tr></table></figure>
<p>m 和 ptr 的 address 都是 0x0</p>
<h2 id="4-不同类型的-nil-是不能比较的"><a href="#4-不同类型的-nil-是不能比较的" class="headerlink" title="4. 不同类型的 nil 是不能比较的"></a>4. 不同类型的 nil 是不能比较的</h2><p>   <strong>code-4</strong> <a href="https://play.golang.org/p/20q0oe2Iu5" target="_blank" rel="external">Play</a></p>
<figure class="highlight go"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div></pre></td><td class="code"><pre><div class="line"><span class="keyword">package</span> main</div><div class="line"></div><div class="line"><span class="keyword">import</span> (</div><div class="line">	<span class="string">"fmt"</span></div><div class="line">)</div><div class="line"></div><div class="line"><span class="function"><span class="keyword">func</span> <span class="title">main</span><span class="params">()</span></span> &#123;</div><div class="line">	<span class="keyword">var</span> m <span class="keyword">map</span>[<span class="keyword">int</span>]<span class="keyword">string</span></div><div class="line">	<span class="keyword">var</span> ptr *<span class="keyword">int</span></div><div class="line">	fmt.Printf(m == ptr)</div><div class="line">&#125;</div></pre></td></tr></table></figure>
<p>code-4 输出</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div></pre></td><td class="code"><pre><div class="line">tmp/sandbox618627491/main.go:10: invalid operation: m == ptr (mismatched types map[int]string and *int)</div></pre></td></tr></table></figure>
<h2 id="5-nil-是-map，slice，pointer，channel，func，interface-的零值"><a href="#5-nil-是-map，slice，pointer，channel，func，interface-的零值" class="headerlink" title="5. nil 是 map，slice，pointer，channel，func，interface 的零值"></a>5. nil 是 map，slice，pointer，channel，func，interface 的零值</h2><p><strong>code-5</strong> <a href="https://play.golang.org/p/VeDuWMU4QR" target="_blank" rel="external">Play</a></p>
<figure class="highlight go"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div><div class="line">12</div><div class="line">13</div><div class="line">14</div><div class="line">15</div><div class="line">16</div><div class="line">17</div><div class="line">18</div><div class="line">19</div><div class="line">20</div></pre></td><td class="code"><pre><div class="line"><span class="keyword">package</span> main</div><div class="line"></div><div class="line"><span class="keyword">import</span> (</div><div class="line">	<span class="string">"fmt"</span></div><div class="line">)</div><div class="line"></div><div class="line"><span class="function"><span class="keyword">func</span> <span class="title">main</span><span class="params">()</span></span> &#123;</div><div class="line">	<span class="keyword">var</span> m <span class="keyword">map</span>[<span class="keyword">int</span>]<span class="keyword">string</span></div><div class="line">	<span class="keyword">var</span> ptr *<span class="keyword">int</span></div><div class="line">	<span class="keyword">var</span> c <span class="keyword">chan</span> <span class="keyword">int</span></div><div class="line">	<span class="keyword">var</span> sl []<span class="keyword">int</span></div><div class="line">	<span class="keyword">var</span> f <span class="function"><span class="keyword">func</span><span class="params">()</span></span></div><div class="line">	<span class="title">var</span> <span class="title">i</span> <span class="title">interface</span>&#123;&#125;</div><div class="line">	fmt.Printf(<span class="string">"%#v\n"</span>, m)</div><div class="line">	fmt.Printf(<span class="string">"%#v\n"</span>, ptr)</div><div class="line">	fmt.Printf(<span class="string">"%#v\n"</span>, c)</div><div class="line">	fmt.Printf(<span class="string">"%#v\n"</span>, sl)</div><div class="line">	fmt.Printf(<span class="string">"%#v\n"</span>, f)</div><div class="line">	fmt.Printf(<span class="string">"%#v\n"</span>, i)</div><div class="line">&#125;</div></pre></td></tr></table></figure>
<p>code-5 输出</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div></pre></td><td class="code"><pre><div class="line">map[int]string(nil)</div><div class="line">(*int)(nil)</div><div class="line">(chan int)(nil)</div><div class="line">[]int(nil)</div><div class="line">(func())(nil)</div><div class="line">&lt;nil&gt;</div></pre></td></tr></table></figure>
<p><a href="https://golang.org/ref/spec#The_zero_value" target="_blank" rel="external">zero value</a> 是 go 中变量在声明之后但是未初始化被赋予的该类型的一个默认值。</p>
<blockquote>
<p>正确理解 nil 是正确理解 go 中类型的重要一环，因而 nil 的任何细节在遇到之后都不要错过，要做到相应的记录。</p>
</blockquote>
