		  <h1 class="title"><a style="font-size: 18px" href="/2017/06/07/sqlalchemy-delete-synchronize-session/">sqlalchemy session 执行 delete 时 synchronize_session 策略</a>
	  		<time datetime="2017-06-07T03:38:37.000Z">
			  	<!-- <a href="/2017/06/07/sqlalchemy-delete-synchronize-session/"></a>  -->
			  	6月 7 2017
			</time>
		  </h1>
		  
		</header>
		 <!-- 
		    <div class="entry">
		      
		        <figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div></pre></td><td class="code"><pre><div class="line">session.query(Tag).filter(Tag.id.in_([1,2,3,4])).delete(synchronize_session=&apos;evaluate&apos;)</div></pre></td></tr></table></figure>
<p>sqlalchemy 利用 session 执行 delete 时有一个 synchronize_session 参数用来说明 session 删除对象时需要执行的策略，共三个选项：</p>
<ol>
<li><strong>False</strong></li>
</ol>
<blockquote>
<p> don’t synchronize the session. This option is the most efficient and is reliable once the session is expired, which typically occurs after a commit(), or explicitly using expire_all(). Before the expiration, objects may still remain in the session which were in fact deleted which can lead to confusing results if they are accessed via get() or already loaded collections.</p>
</blockquote>
<p>不同步 session，如果被删除的 objects 已经在 session 中存在，在 session commit 或者 expire_all 之前，这些被删除的对象都存在 session 中。</p>
<p>不同步可能会导致获取被删除 objects 时出错。</p>
<ol>
<li><strong>fetch</strong></li>
</ol>
<blockquote>
<p>performs a select query before the delete to find objects that are matched by the delete query and need to be removed from the session. Matched objects are removed from the session.</p>
</blockquote>
<p>删除之前从 db 中匹配被删除的对象并保存在 session 中，然后再从 session 中删除，这样做是为了让 session 的对象管理 identity_map 得知被删除的对象究竟是哪些以便更新引用关系。</p>
<ol>
<li><strong>evaluate</strong></li>
</ol>
<blockquote>
<p> Evaluate the query’s criteria in Python straight on the objects in the session. If evaluation of the criteria isn’t implemented, an error is raised.<br>The ‘evaluate’ strategy performs a scan of all matching objects within the Session; if the contents of the Session are expired, such as via a proceeding Session.commit() call, this will result in SELECT queries emitted for every matching object.</p>
</blockquote>
<p>默认值。根据当前的 query criteria 扫描 session 中的 objects，如果不能正确执行则抛出错误，这句话也可以理解为，如果 session 中原本就没有这些被删除的 objects，扫描当然不会发生匹配，相当于匹配未正确执行。</p>
<p>注意这里报错只会在特定 query criteria 时报错，比如 <code>in</code> 操作。</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div></pre></td><td class="code"><pre><div class="line"></div><div class="line">session.query(Tag).filter(Tag.id.in_([1,2,3])).delete()</div><div class="line"></div><div class="line">sqlalchemy.exc.InvalidRequestError: Could not evaluate current criteria in Python. Specify &apos;fetch&apos; or False for the synchronize_session parameter.</div></pre></td></tr></table></figure>

	<article  class="post">
		<header>
		  <h1 class="title"><a style="font-size: 18px" href="/2017/05/25/sqlalchemy-model-id-zero/">如果 SQLAlchemy model 自增主键等于 0</a>
	  		<time datetime="2017-05-25T03:09:06.000Z">
			  	<!-- <a href="/2017/05/25/sqlalchemy-model-id-zero/"></a>  -->
			  	5月 25 2017
			</time>
		  </h1>
		  
			  <div class="tags">
			  	<i class="fa fa-tag"></i>
			    <a href="/tags/python/">python</a> <a href="/tags/mysql/">mysql</a> <a href="/tags/主键/">主键</a>
			  </div>
			
		</header>
		 <!-- 
		    <div class="entry">
		      
		        <p>SQLAlchemy 使用 session 生成新的数据根据主键的不同大致有以下几种情况，其中主键是 0 最为特殊。</p>
<p>测试环境</p>
<ul>
<li>SQLAlchemy  1.0.9</li>
<li>mysql 5.6.27</li>
<li>pythonn 2.7</li>
</ul>
<p><strong>不指定主键</strong></p>
<p>新创建 <a href="http://www.sqlalchemy.org/" target="_blank" rel="external">SQLAlchemy</a> ORM model instance 不指定主键，默认是 None</p>
<p>Model</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div></pre></td><td class="code"><pre><div class="line"><span class="class"><span class="keyword">class</span> <span class="title">Tag</span><span class="params">(Base)</span>:</span></div><div class="line">    __tablename__ = <span class="string">'tag'</span></div><div class="line">    id = Column(Integer, primary_key=<span class="keyword">True</span>) <span class="comment"># 主键自增</span></div><div class="line">    name = Column(VARCHAR(<span class="number">255</span>), nullable=<span class="keyword">False</span>)</div><div class="line">    group_id = Column(Integer)</div></pre></td></tr></table></figure>
<p>提交之后生成对应的主键</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div></pre></td><td class="code"><pre><div class="line">session = DBSession()</div><div class="line">t = Tag()</div><div class="line">t.name = random.choice(<span class="string">'abcdefgjoiuytreqzxcvbnml'</span>)</div><div class="line">t.group_id = random.choice([<span class="number">1</span>, <span class="number">2</span>, <span class="number">3</span>, <span class="number">4</span>, <span class="number">5</span>])</div><div class="line"><span class="keyword">print</span> t.id <span class="comment"># None</span></div><div class="line">session.add(t)</div><div class="line">session.commit()</div><div class="line"><span class="keyword">print</span> t.id <span class="comment"># 1</span></div></pre></td></tr></table></figure>
<p><strong>指定一个已经存在的主键</strong></p>
<p>指定一个已经存在的主键 id，SQLAlchemy 并不会校验该数据是否经在 db table 中有了对应的 row，直接执行 insert 语句</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div></pre></td><td class="code"><pre><div class="line">session = DBSession()</div><div class="line">t = Tag()</div><div class="line">t.id = <span class="number">1</span></div><div class="line">t.name = random.choice(<span class="string">'abcdefgjoiuytreqzxcvbnml'</span>)</div><div class="line">t.group_id = random.choice([<span class="number">1</span>, <span class="number">2</span>, <span class="number">3</span>, <span class="number">4</span>, <span class="number">5</span>])</div><div class="line">session.add(t)</div><div class="line">session.commit() <span class="comment">#提交触发异常</span></div><div class="line"><span class="keyword">print</span> t.id</div></pre></td></tr></table></figure>
<p>执行报 Duplicate entry for primary 异常，id = 1 的 row 已经存在。</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><div class="line">1</div></pre></td><td class="code"><pre><div class="line">sqlalchemy.exc.IntegrityError: (pymysql.err.IntegrityError) (1062, u<span class="string">"Duplicate entry '1' for key 'PRIMARY'"</span>) [SQL: u<span class="string">'INSERT INTO tag (id, name, group_id) VALUES (%(id)s, %(name)s, %(group_id)s)'</span>] [parameters: &#123;<span class="string">'group_id'</span>: 3, <span class="string">'id'</span>: 1, <span class="string">'name'</span>: <span class="string">'i'</span>&#125;]</div></pre></td></tr></table></figure>
