		  <h1 class="title"><a style="font-size: 18px" href="/2017/02/16/mongodb-practice-for-four-years-md/">创业这些年使用 mongodb 的实践教训</a>
	  		<time datetime="2017-02-16T08:49:14.000Z">
			  	<!-- <a href="/2017/02/16/mongodb-practice-for-four-years-md/"></a>  -->
			  	2月 16 2017
			</time>
		  </h1>
		  
			  <div class="tags">
			  	<i class="fa fa-tag"></i>
			    <a href="/tags/创业/">创业</a>
			  </div>
			
		</header>
		 <!-- 
		    <div class="entry">
		      
		        <p>在生产环境中使用 mongodb 始于 2012 年左右，从最初的 master-slave 模式到后来的 master-replication，到评估 mongodb-sharding 并放弃在生产环境中使用，使用 mongodb 作为基础数据库已经服务了上亿用户。在 4 年的 mongodb 生产环境使用当中，踩了很多坑也走了不少弯路，在此记录，与君共享。</p>
<h2 id="No-schema-并不代表没有一致性"><a href="#No-schema-并不代表没有一致性" class="headerlink" title="No schema 并不代表没有一致性"></a>No schema 并不代表没有一致性</h2><p>mongodb 是 nosql 数据库，强调 schema 的灵活性和强大的集群功能，以及牺牲事务带来的巨大性能提升。如果只是用 mongodb 记录日志，一致性并不是很重要，相反如果是关键性业务，鉴于 schema 极强的灵活性，经常会造成 collection 数据结构被变更而且不易察觉，表现的结果是应用程序常会出现诡异而无法深入跟踪原因的 bug 和异常。业务越庞大，这样的改变越是灾难性的。</p>
<blockquote>
<p>设计之初就对一致性做出非常严格的校验和控制，好消息是 mongodb 3.2 开始已经从数据库层面支持对 collection 结构的校验。每次表结构调整，都要对<strong>历史数据进行相应的变更</strong>。</p>
</blockquote>
<h2 id="对开发者使用门槛降低的同时，也是在对躲在暗处的人敞开了大门"><a href="#对开发者使用门槛降低的同时，也是在对躲在暗处的人敞开了大门" class="headerlink" title="对开发者使用门槛降低的同时，也是在对躲在暗处的人敞开了大门"></a>对开发者使用门槛降低的同时，也是在对躲在暗处的人敞开了大门</h2><p>mongodb 非常容易安装和使用，无需任何权限设置即可开箱即用，而且默认mongodb 的端口是可以从公网访问的，仅仅这样的设计就已经造成了无数的安全问题，详见<a href="http://coolshell.cn/articles/17607.html" target="_blank" rel="external">mongodb 赎金门事件</a>。虽然数据库没有强制要是有口令和用户来管理权限，但是开发者的安全意识不能松懈。</p>
<blockquote>
<p>任何时候部署mongodb 都应该尽早设置用户、口令以及相关权限。</p>
</blockquote>
<h2 id="升级要趁早"><a href="#升级要趁早" class="headerlink" title="升级要趁早"></a>升级要趁早</h2><p>mongodb 版本的迭代比较稳定，每年会有一到两次版本发布，每次新发布都会带来不少性能改进和优化，也有少量 api 的变动，变化相对较大的是 mongodb 的驱动。为了尽可能早地享受版本升级代来的好处，要制定一套对线上环境进行新版测试、安装、兼容过渡的方案。</p>
<blockquote>
<p>升级版本不能跨度太大，mongodb 官方也推荐生产环境升级要渐进式的而不是跨越式的，每次升级<strong>一定要备份数据</strong>。</p>
</blockquote>

	  		<time datetime="2016-08-27T13:38:14.000Z">
			  	<!-- <a href="/2016/08/27/mongodb-single-table-split/"></a>  -->
			  	8月 27 2016
			</time>
		  </h1>
		  
			  <div class="tags">
			  	<i class="fa fa-tag"></i>
			    <a href="/tags/表拆分/">表拆分</a>
			  </div>
			
		</header>
		 <!-- 
		    <div class="entry">
		      
		        <p>拆表是一种常见的解决单表数据库瓶颈的方案，在实际的应用场景中能够部分解决单表的写压力和读压力，但是也会带来一些更复杂的影响：</p>
<ul>
<li>聚合查询变得困难</li>
<li>拆分的键一旦选定，更改会非常困难</li>
<li>拆表的过程要保证线上业务不受影响，操作复杂度高</li>
</ul>
<p>因此，表的拆分一定要选在恰当的时候进行，过早，付出很大代价也并不会带来性能的提升，过晚，数据量庞大，操作难度加大。</p>
<p>在本次实施的拆分方案中，数据特点是:</p>
<ul>
<li>单表过亿</li>
<li>业务数据是用户对资源的收藏，结构比较单一</li>
<li>只做单向(用户–&gt;数据)查找，不要求反向(数据–&gt;用户)查找</li>
<li>数据处于实时变更状态(新增、删除、查询等操作并存)</li>
</ul>
<h2 id="如何选择拆分键"><a href="#如何选择拆分键" class="headerlink" title="如何选择拆分键"></a>如何选择拆分键</h2><p>本例中，拆分的键就是用户 id，且每个用户关联的资源数据最大不会过万。</p>
<h2 id="如何保证拆分的过程中不影响用户的操作？"><a href="#如何保证拆分的过程中不影响用户的操作？" class="headerlink" title="如何保证拆分的过程中不影响用户的操作？"></a>如何保证拆分的过程中不影响用户的操作？</h2><p>本例中，表中的数据基本上只有如下操作</p>
<ul>
<li>用户新增一条数据</li>
<li>用户删除一条数据</li>
<li>用户查询数据(有翻页)</li>
</ul>
